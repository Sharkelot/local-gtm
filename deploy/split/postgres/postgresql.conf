# A standalone config prevents TLS/HBA policy from silently falling back to image defaults.
data_directory = '/var/lib/postgresql/data'
listen_addresses = '*'
port = 5432
password_encryption = 'scram-sha-256'

ssl = on
ssl_cert_file = '/etc/postgresql/tls/server.crt'
ssl_key_file = '/etc/postgresql/tls/server.key'
ssl_ca_file = '/etc/postgresql/tls/root.crt'
hba_file = '/etc/postgresql/pg_hba.conf'

# Backups and WAL archival are deployment obligations. Do not add a no-op
# archive_command here; deploy/split/README.md documents the required operator hook.
