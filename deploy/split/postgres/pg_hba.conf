# Local maintenance is contained in the private CT. Every TCP client path is
# TLS-only and SCRAM-authenticated; plaintext host entries are intentionally absent.
# The official image initializes the configured bootstrap role while running as
# the container's `postgres` OS user. Trust is limited to this container-local
# Unix socket; every inter-CT TCP path remains TLS + SCRAM below.
local   all             all                                     trust
hostssl all             all             0.0.0.0/0               scram-sha-256
hostssl all             all             ::0/0                   scram-sha-256
