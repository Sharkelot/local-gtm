name: Quality and security

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: quality-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: TypeScript, lint, unit, integration, build
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    env:
      DATABASE_URL: postgresql://test:test@127.0.0.1:5432/local_gtm_test
      INTERNAL_DATABASE_URL: postgresql://test:test@127.0.0.1:5432/local_gtm_test
      TEST_DATABASE_URL: postgresql://test:test@127.0.0.1:5432/local_gtm_test
      REDIS_URL: redis://127.0.0.1:6379
      NEXTAUTH_SECRET: ci-only-secret-with-sufficient-length
      KEYCLOAK_CLIENT_ID: local-gtm-ci
      KEYCLOAK_CLIENT_SECRET: ci-client-secret
      KEYCLOAK_ISSUER: https://identity.example.test/realms/local-gtm
      INFERENCE_WORKER_TOKEN: ci-worker-token
      DEV_ENVELOPE_KEY: 0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef
    services:
      postgres:
        image: postgres:17.7-bookworm
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: local_gtm_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U test -d local_gtm_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7.4.7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @local-gtm/db db:generate
      - run: pnpm --filter @local-gtm/db db:migrate
      - run: pnpm typecheck
      - run: pnpm lint
      - run: pnpm test
      - run: pnpm test:integration
      - run: pnpm build
      - run: pnpm --filter @local-gtm/db db:seed
      - run: pnpm --filter @local-gtm/web exec playwright install --with-deps chromium
      - run: pnpm test:e2e

  dependency-audit:
    name: Dependency audit
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm audit --prod --audit-level=high

  filesystem-scan:
    name: Filesystem vulnerability scan
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: aquasecurity/trivy-action@0.28.0
        with:
          scan-type: fs
          severity: HIGH,CRITICAL
          exit-code: '1'
          ignore-unfixed: true
