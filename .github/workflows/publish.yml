name: Publish images

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]

permissions:
  contents: read
  packages: write

concurrency:
  group: publish-main
  cancel-in-progress: false

jobs:
  publish:
    name: Publish GHCR images
    if: >-
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'push' &&
      github.event.workflow_run.head_branch == 'main'
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
      - uses: docker/setup-buildx-action@b5ca514318fb6c203bef6baf8199c721f8922d8c # v3.10.0
      - uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3.6.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Publish web image
        uses: docker/build-push-action@14487c788077a082d674a64272168311680cb370 # v6.16.0
        with:
          context: .
          file: apps/web/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/web:${{ github.event.workflow_run.head_sha }}
            ghcr.io/${{ github.repository }}/web:main
          labels: |
            org.opencontainers.image.source=${{ github.repositoryUrl }}
            org.opencontainers.image.revision=${{ github.event.workflow_run.head_sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Publish platform worker image
        uses: docker/build-push-action@14487c788077a082d674a64272168311680cb370 # v6.16.0
        with:
          context: .
          file: apps/platform-worker/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/platform-worker:${{ github.event.workflow_run.head_sha }}
            ghcr.io/${{ github.repository }}/platform-worker:main
          labels: |
            org.opencontainers.image.source=${{ github.repositoryUrl }}
            org.opencontainers.image.revision=${{ github.event.workflow_run.head_sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Publish migrator image
        uses: docker/build-push-action@14487c788077a082d674a64272168311680cb370 # v6.16.0
        with:
          context: .
          file: packages/db/Dockerfile.migrator
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/migrator:${{ github.event.workflow_run.head_sha }}
            ghcr.io/${{ github.repository }}/migrator:main
          labels: |
            org.opencontainers.image.source=${{ github.repositoryUrl }}
            org.opencontainers.image.revision=${{ github.event.workflow_run.head_sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
